<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Open World Drift & Pursuit</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimal-ui, shrink-to-fit=no">
    
    <style>
        body {
            font-family: arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #192819; /* Matches your BG_COLOR */
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 0px none;
            background-color: black;
            display: block;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

    <script type="text/javascript">
        // Pygbag global configuration object
        window.async_config = {
            cdn: "https://pygame-web.github.io/archives/0.9/",
            args: ["--interactive"],
            type: "mount"
        }
    </script>
    
    <script src="https://pygame-web.github.io/archives/0.9/pygbag.js" async defer></script>
</body>
</html>
